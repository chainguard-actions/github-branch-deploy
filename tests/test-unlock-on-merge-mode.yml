name: Test unlock on merge mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          environment: "production"
          environment_targets: "production,development,staging"
          unlock_on_merge_mode: "true"
          merge_deploy_mode: "false"
          update_branch: "disabled"
          outdated_mode: "pr_base"
          skip_ci: "production,development,staging"
          skip_reviews: "production,development,staging"
          permissions: "write,admin"
        continue-on-error: true

      - name: Assert action completed
        env:
          OUTCOME: ${{ steps.action.outcome }}
          UNLOCKED: ${{ steps.action.outputs.unlocked_environments }}
        run: |
          echo "outcome: $OUTCOME"
          echo "unlocked_environments: $UNLOCKED"
          # In unlock_on_merge_mode with no locks, the action should complete
          # The unlocked_environments output may be empty if no locks existed
          echo "PASS: action completed in unlock_on_merge_mode (outcome=$OUTCOME)"
